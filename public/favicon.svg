<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="lensDepth" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#9B4FE8"/>
      <stop offset="50%" style="stop-color:#4A1A8C"/>
      <stop offset="100%" style="stop-color:#1E0650"/>
    </radialGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C42"/>
      <stop offset="100%" style="stop-color:#CC4400"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#4A1A8C" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="64" height="64" rx="14" fill="white"/>

  <!-- Outer orange ring shadow -->
  <circle cx="30" cy="29" r="19" fill="none" stroke="#FF6B1A" stroke-width="0.5" opacity="0.2"/>

  <!-- Lens outer ring - orange -->
  <circle cx="30" cy="29" r="18" fill="none" stroke="#FF6B1A" stroke-width="3.5" filter="url(#shadow)"/>

  <!-- Lens inner - violet depth -->
  <circle cx="30" cy="29" r="15" fill="url(#lensDepth)"/>

  <!-- Lens shine arc -->
  <path d="M 18 22 Q 23 15 31 15" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>

  <!-- RG text -->
  <text x="30" y="34"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13"
    font-weight="bold"
    fill="white"
    text-anchor="middle"
    letter-spacing="1.5"
    filter="url(#glow)">RG</text>

  <!-- Handle -->
  <line x1="44" y1="43" x2="56" y2="56" stroke="url(#handleGrad)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Handle shine -->
  <line x1="45" y1="44" x2="54.5" y2="54" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.35"/>

</svg>